<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: system-ui, sans-serif;
        background: #f5f5f0;
        padding: 2rem;
        color: #1a1a1a;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(0,0,0,0.08);
    }

    thead {
        background: #f9f9f7;
    }

    th {
        padding: 10px 14px;
        text-align: left;
        font-size: 11px;
        font-weight: 500;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid rgba(0,0,0,0.07);
        white-space: nowrap;
    }

    td {
        padding: 10px 14px;
        font-size: 14px;
        border-bottom: 1px solid rgba(0,0,0,0.06);
        vertical-align: middle;
    }

    tr:last-child td {
        border-bottom: none;
    }

    tbody tr:hover {
        background: #fafaf8;
    }

    td:first-child {
        font-family: monospace;
        font-size: 12px;
        color: #aaa;
    }

    img {
        display: block;
        border-radius: 4px;
    }

    #btn {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 20px 0px;
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translate(-50%);
    }

    button {
        padding: 10px 20px;
        margin: 0 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
    }

    #search {
        margin-bottom: 20px;
        padding: 10px;
        width: 100%;
        max-width: 400px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

</style>

<body>

    <input id="search" type="search" placeholder="Rechercher un pokémon...">

    <select id="type-filter">
        <option value="">Tous les types</option>
        <!-- Les options de type seront ajoutées ici par JavaScript -->
    </select>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Génération</th>
                <th>Types</th>
                <th>Stamina</th>
                <th>Base Attack</th>
                <th>Base Defense</th>
                <th>Image</th>
            </tr>
        </thead>
        <tbody>
            <!-- Les données des pokémons seront insérées ici par JavaScript -->
             <div id="btn">
                <button id="btn-prec">PREC</button>
                <p id="page-info"></p>
                <button id="btn-suiv">SUIV</button>
             </div>
        </tbody>
    </table>
    
</body>

    <script src="./js/jquery-3.7.1.js"></script>

    <script src="./data/type_effectiveness.js"></script>
    <script src="./data/pokemon_moves.js"></script>
    <script src="./data/pokemon_types.js"></script>
    <script src="./data/pokemons.js"></script>

    <script src="./data/charged_moves.js"></script>
    <script src="./data/fast_moves.js"></script>

    <script src="./data/class_attack.js"></script>
    <script src="./data/class_type.js"></script>
    <script src="./data/class_pokemon.js"></script>

    <script src="./test/test.js"></script>
    <script src="./js/script.js"></script>

</html>
